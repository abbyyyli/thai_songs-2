<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@400;600;700;800&family=Noto+Sans+Thai:wght@500;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --bg1:#14121c;
  --bg2:#101018;
  --text:#fff8ef;
  --muted:#c9c0b7;
  --soft:#a9a2b5;
  --accent:#f2bb6b;
  --accent-soft:rgba(242,187,107,.10);
  --accent-line:rgba(242,187,107,.38);
  --card:rgba(255,255,255,.095);
  --card2:rgba(255,255,255,.045);
  --line:rgba(255,255,255,.13);
  --shadow:0 18px 46px rgba(0,0,0,.28);
  --thai-font:'Noto Sans Thai',sans-serif;
  --ui-font:'Inter','Noto Sans TC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --zh-font:'Noto Serif TC','Noto Serif CJK TC','Songti TC',serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at 8% -8%,rgba(242,187,107,.23),transparent 34%),
    radial-gradient(circle at 88% 0%,rgba(145,168,216,.16),transparent 36%),
    linear-gradient(145deg,var(--bg1),var(--bg2));
  color:var(--text);
  font-family:var(--ui-font);
  line-height:1.72;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
a{text-decoration:none;color:inherit}
.wrap{max-width:1080px;margin:auto;padding:56px 22px 48px}
.k{
  font-family:var(--ui-font);
  color:var(--accent);
  font-size:12px;
  letter-spacing:.16em;
  text-transform:uppercase;
  font-weight:800;
}
.hero{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:28px;
  align-items:end;
  padding:8px 0 18px;
}
h1{
  font-family:var(--ui-font);
  font-size:52px;
  line-height:1.05;
  margin:9px 0 10px;
  font-weight:800;
  letter-spacing:-.035em;
}
.sub{
  font-family:var(--zh-font);
  color:var(--muted);
  max-width:760px;
  font-size:15.5px;
  line-height:1.95;
  font-weight:400;
}
.hero-panel{
  background:linear-gradient(145deg,var(--card),var(--card2));
  border:1px solid var(--line);
  border-radius:26px;
  padding:20px;
  box-shadow:var(--shadow);
}
.panel-title{
  color:var(--accent);
  font-size:12px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:12px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.stat{
  border:1px solid rgba(255,255,255,.11);
  background:rgba(255,255,255,.04);
  border-radius:18px;
  padding:12px;
}
.stat b{display:block;font-size:22px;color:#fff7ee;line-height:1}
.stat span{display:block;color:var(--muted);font-size:11.5px;margin-top:6px}
.tools{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:22px 0 6px;
}
.search{
  flex:1 1 250px;
  min-width:0;
  border:1px solid var(--line);
  background:rgba(255,255,255,.07);
  color:var(--text);
  border-radius:999px;
  padding:10px 14px;
  font-family:var(--ui-font);
  font-size:14px;
}
.search::placeholder{color:var(--soft)}
.btn,.pill{
  font-family:var(--ui-font);
  border:1px solid var(--line);
  background:rgba(255,255,255,.055);
  color:var(--muted);
  border-radius:999px;
  padding:9px 13px;
  font-size:12.5px;
  cursor:pointer;
  transition:.15s ease;
}
.btn:hover,.pill.active{
  border-color:rgba(242,187,107,.78);
  color:var(--accent);
  background:var(--accent-soft);
}
.btn.gold{
  border-color:var(--accent-line);
  background:var(--accent-soft);
  color:#f5d6a3;
}
.library-head{
  margin:34px 0 14px;
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:end;
}
.library-head h2{
  font-size:18px;
  letter-spacing:-.01em;
}
.library-head p{
  color:var(--muted);
  font-family:var(--zh-font);
  font-size:13px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}
.card{
  display:block;
  position:relative;
  overflow:hidden;
  background:linear-gradient(145deg,var(--card),var(--card2));
  border:1px solid var(--line);
  border-radius:24px;
  padding:22px;
  box-shadow:var(--shadow);
  transition:.16s ease;
}
.card:before{
  content:"";
  position:absolute;
  right:-42px;
  top:-42px;
  width:128px;
  height:128px;
  background:radial-gradient(circle,rgba(242,187,107,.17),transparent 70%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-4px) scale(1.01);
  border-color:var(--accent);
  box-shadow:0 24px 56px rgba(0,0,0,.35);
}
.thai{
  font-family:var(--thai-font);
  font-size:30px;
  font-weight:800;
  line-height:1.3;
}
.roman{
  font-family:var(--mono);
  color:#e6c58e;
  font-size:13px;
  margin-top:3px;
}
.meta{
  font-family:var(--ui-font);
  margin-top:8px;
  color:var(--muted);
  font-size:13.5px;
}
.card-pills{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-top:13px;
}
.tag{
  font-family:var(--ui-font);
  display:inline-flex;
  border:1px solid var(--accent-line);
  background:var(--accent-soft);
  color:#f5d6a3;
  border-radius:999px;
  padding:4px 9px;
  font-size:11.5px;
  font-weight:600;
}
.progress{
  margin-top:18px;
}
.progress-row{
  display:flex;
  justify-content:space-between;
  color:var(--muted);
  font-size:12px;
  margin-bottom:7px;
}
.bar{
  height:9px;
  border-radius:999px;
  overflow:hidden;
  background:rgba(255,255,255,.10);
  border:1px solid var(--line);
}
.bar span{
  display:block;
  height:100%;
  width:0;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),#9fd7c7);
}
.open{
  display:inline-flex;
  margin-top:18px;
  color:var(--accent);
  font-weight:800;
  font-size:13px;
}
.empty{
  display:none;
  border:1px dashed var(--line);
  border-radius:20px;
  padding:22px;
  color:var(--muted);
  font-family:var(--zh-font);
  text-align:center;
}
.import-file{display:none}
footer{
  margin-top:34px;
  border-top:1px solid rgba(255,255,255,.08);
  color:rgba(201,192,183,.75);
  font-size:12px;
  text-align:center;
  padding:24px 0 0;
}
@media(max-width:760px){
  .wrap{padding:34px 16px 42px}

  h1{font-size:40px}
  .stats{grid-template-columns:repeat(3,1fr)}

function readState(key){
  try{return JSON.parse(localStorage.getItem(key)||"{}")}catch(e){return {}}
}
function countObj(obj){return obj?Object.values(obj).filter(Boolean).length:0}
function getSongStats(song){
  const s = readState(song.storageKey);
  const fav = countObj(s.favorite);
  const learned = countObj(s.learned);
  const t = song.totals || {lyrics:0,patterns:0,vocab:0};
  const total = (t.lyrics||0) + (t.patterns||0) + (t.vocab||0);
  const pct = Math.min(100, Math.round((learned / total) * 100));
  return {fav, learned, pct};
}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function js(s){return String(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g,"\\n")}
function renderSongs(){
  const q = (document.getElementById("search").value||"").trim().toLowerCase();
  const grid = document.getElementById("songGrid");
  const list = SONGS.filter(song=>{
    const passSearch = !q || (song.title+" "+song.roman+" "+song.artist+" "+song.english+" "+song.tags.join(" ")+" "+song.search).toLowerCase().includes(q);
    return passSearch;
  });
  grid.innerHTML = list.map(song=>{
    const st = getSongStats(song);
    return `<a class="card" href="${esc(song.href)}">
      <div class="thai">${esc(song.title)}</div>
      <div class="roman">${esc(song.roman)}</div>
      <div class="meta">${esc(song.artist)} · ${esc(song.english)}</div>
      <div class="card-pills">
        <span class="tag">${esc(song.level)}</span>
        ${(song.topics||[]).map(topic=>`<span class="tag">${esc(topic)}</span>`).join("")}
        <span class="tag">Favorites ${st.fav}</span>
      </div>
      <div class="progress">
        <div class="progress-row"><span>Learned</span><span>${st.pct}%</span></div>
        <div class="bar"><span style="width:${st.pct}%"></span></div>
      </div>
      <span class="open">Open lesson →</span>
    </a>`;
  }).join("");
  document.getElementById("empty").style.display = list.length ? "none" : "block";
}

function exportAllState(){
  const payload = {
    app:"Thai Song Lab",
    version:2,
    exportedAt:new Date().toISOString(),
    songs:{}
  };
  SONGS.forEach(song=>{
    payload.songs[song.slug] = {
      storageKey:song.storageKey,
      state:readState(song.storageKey)
    };
  });
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "thai-song-lab-progress.json";
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  a.remove();
}
function importAllState(event){
  const file = event.target.files && event.target.files[0];
  if(!file)return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      let imported = 0;
      if(data.songs){
        Object.values(data.songs).forEach(item=>{
          if(item.storageKey && item.state && SONGS.some(song=>song.storageKey===item.storageKey)){
            localStorage.setItem(item.storageKey, JSON.stringify(item.state));
            imported++;
          }
        });
      }else if(data.state && data.song){
        const incomingSlug = typeof data.song==='string' ? data.song : data.song?.slug;
        const found = SONGS.find(s=>s.slug===incomingSlug);
        if(found){
          localStorage.setItem(found.storageKey, JSON.stringify(data.state));
          imported++;
        }
      }else{
        throw new Error("Invalid file");
      }
      if(!imported) throw new Error("No matching song");
      renderSongs();
      alert(`已匯入 ${imported} 首歌的 Song Lab 進度。`);
    }catch(e){
      alert("匯入失敗：這不是有效的 Song Lab 進度檔。");
    }
    event.target.value = "";
  };
  reader.readAsText(file);
}
renderSongs();
</script>
